<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KiddoGame - แหล่งรวมความสนุกสำหรับเด็ก</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .game-card:active {
            transform: scale(0.95);
        }
        .category-pill.active {
            background-color: #4F46E5;
            color: white;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 transition-colors duration-300">

    <!-- Mobile Navigation Bottom (Fixed) -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-md border-t border-slate-100 flex justify-around items-center py-3 z-50 md:hidden">
        <button onclick="filterCategory('all')" class="flex flex-col items-center text-indigo-600">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
            </svg>
            <span class="text-xs mt-1 font-light">หน้าแรก</span>
        </button>
        <button onclick="scrollToSearch()" class="flex flex-col items-center text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
            <span class="text-xs mt-1 font-light">ค้นหา</span>
        </button>
        <button class="flex flex-col items-center text-slate-400">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z" />
            </svg>
            <span class="text-xs mt-1 font-light">ชื่นชอบ</span>
        </button>
    </nav>

    <!-- Header & Search -->
    <header class="sticky top-0 bg-slate-50/90 backdrop-blur-sm z-40 px-6 py-4 md:py-6 max-w-7xl mx-auto w-full">
        <div class="flex items-center justify-between mb-6">
            <div>
                <h1 class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-500 bg-clip-text text-transparent">KiddoGame</h1>
                <p class="text-slate-400 text-sm">เล่นสนุก เรียนรู้ไว 🌈</p>
            </div>
            <div class="flex items-center gap-3">
                <button class="p-2 bg-white rounded-full shadow-sm">
                    <span class="text-xl">👤</span>
                </button>
            </div>
        </div>

        <!-- Search Bar -->
        <div id="search-section" class="relative group">
            <input 
                type="text" 
                id="search-input"
                placeholder="ค้นหาเกมที่อยากเล่น..." 
                class="w-full bg-white border-none rounded-2xl py-4 px-12 shadow-sm focus:ring-2 focus:ring-indigo-300 transition-all outline-none"
                oninput="handleSearch(this.value)"
            >
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 absolute left-4 top-1/2 -translate-y-1/2 text-slate-300 group-focus-within:text-indigo-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 pb-24">
        
        <!-- Category Selector -->
        <section class="mb-8">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                หมวดหมู่ยอดนิยม
            </h2>
            <div class="flex gap-3 overflow-x-auto hide-scrollbar pb-2" id="category-list">
                <!-- Categories will be generated by JS -->
            </div>
        </section>

        <!-- Featured Section -->
        <section class="mb-10">
            <div class="relative w-full h-48 md:h-64 bg-indigo-500 rounded-3xl overflow-hidden shadow-lg shadow-indigo-100 group">
                <div class="absolute inset-0 bg-gradient-to-t from-black/50 to-transparent"></div>
                <div class="absolute bottom-6 left-6 text-white">
                    <span class="bg-yellow-400 text-yellow-900 text-[10px] font-bold px-2 py-1 rounded-full uppercase tracking-wider">ยอดนิยมสัปดาห์นี้</span>
                    <h3 class="text-2xl font-bold mt-2">นักผจญภัยในอวกาศ</h3>
                    <p class="text-white/80 text-sm mt-1">มาร่วมไขปริศนาดวงดาวไปพร้อมกัน!</p>
                </div>
                <div class="absolute top-1/2 right-10 -translate-y-1/2 text-6xl transform group-hover:scale-110 transition-transform hidden md:block">
                    🚀
                </div>
            </div>
        </section>

        <!-- Games Grid -->
        <section>
            <div class="flex items-center justify-between mb-6">
                <h2 id="grid-title" class="text-xl font-bold">เกมทั้งหมด</h2>
                <span class="text-indigo-500 text-sm font-medium" id="game-count">12 รายการ</span>
            </div>
            
            <div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-6" id="games-grid">
                <!-- Games will be generated by JS -->
            </div>
        </section>
    </main>

    <!-- Game Player Modal -->
    <div id="game-modal" class="fixed inset-0 z-[100] hidden bg-black flex flex-col">
        <header class="bg-white/10 backdrop-blur-md p-4 flex justify-between items-center text-white">
            <div class="flex items-center gap-3">
                <span id="playing-emoji" class="text-2xl">🎮</span>
                <span id="playing-title" class="font-medium">Game Title</span>
            </div>
            <button onclick="closeGame()" class="p-2 hover:bg-white/20 rounded-full transition-colors">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                </svg>
            </button>
        </header>
        <div class="flex-1 flex flex-col items-center justify-center relative overflow-hidden bg-slate-900">
            <!-- Simulated Game Area -->
            <div class="text-center text-white/50 space-y-4">
                <div id="game-loader-icon" class="text-6xl animate-bounce">🎨</div>
                <p class="text-xl animate-pulse">กำลังโหลดความสนุก...</p>
                <div class="max-w-xs mx-auto bg-white/10 h-2 w-48 rounded-full overflow-hidden">
                    <div class="bg-indigo-500 h-full animate-[loading_2s_ease-in-out_infinite]" style="width: 30%"></div>
                </div>
            </div>
        </div>
        <footer class="p-6 bg-white flex justify-center gap-6">
            <button class="bg-indigo-600 text-white px-8 py-3 rounded-2xl font-bold shadow-lg">เริ่มเล่นเลย</button>
        </footer>
    </div>

    <style>
        @keyframes loading {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(200%); }
        }
    </style>

    <script>
        const categories = [
            { id: 'all', name: 'ทั้งหมด', emoji: '🌟' },
            { id: 'puzzle', name: 'ปริศนา', emoji: '🧩' },
            { id: 'action', name: 'แอคชั่น', emoji: '🔥' },
            { id: 'education', name: 'เรียนรู้', emoji: '📚' },
            { id: 'sport', name: 'กีฬา', emoji: '⚽' },
            { id: 'art', name: 'วาดภาพ', emoji: '🎨' }
        ];

        const games = [
            { id: 1, title: 'นักล่าผลไม้', category: 'action', emoji: '🍎', color: 'bg-red-50', text: 'text-red-500', rating: 4.8 },
            { id: 2, title: 'จับคู่สัตว์น้อย', category: 'puzzle', emoji: '🐯', color: 'bg-orange-50', text: 'text-orange-500', rating: 4.5 },
            { id: 3, title: 'บวกเลขหรรษา', category: 'education', emoji: '➕', color: 'bg-blue-50', text: 'text-blue-500', rating: 4.9 },
            { id: 4, title: 'นักเตะจิ๋ว', category: 'sport', emoji: '⚽', color: 'bg-green-50', text: 'text-green-500', rating: 4.2 },
            { id: 5, title: 'ระบายสีนกน้อย', category: 'art', emoji: '🦜', color: 'bg-pink-50', text: 'text-pink-500', rating: 4.7 },
            { id: 6, title: 'ผจญภัยในป่า', category: 'action', emoji: '🌳', color: 'bg-emerald-50', text: 'text-emerald-500', rating: 4.4 },
            { id: 7, title: 'เขาวงกตชีส', category: 'puzzle', emoji: '🧀', color: 'bg-yellow-50', text: 'text-yellow-500', rating: 4.6 },
            { id: 8, title: 'สะกดคำภาษาไทย', category: 'education', emoji: '🇹🇭', color: 'bg-indigo-50', text: 'text-indigo-500', rating: 5.0 },
            { id: 9, title: 'แข่งเรือหอยทาก', category: 'sport', emoji: '🐌', color: 'bg-cyan-50', text: 'text-cyan-500', rating: 4.1 },
            { id: 10, title: 'ดนตรีบับเบิ้ล', category: 'art', emoji: '🫧', color: 'bg-purple-50', text: 'text-purple-500', rating: 4.3 },
            { id: 11, title: 'ยานบินกล้วยหอม', category: 'action', emoji: '🍌', color: 'bg-amber-50', text: 'text-amber-500', rating: 4.6 },
            { id: 12, title: 'เงาของใครนะ', category: 'puzzle', emoji: '👤', color: 'bg-slate-100', text: 'text-slate-500', rating: 4.8 }
        ];

        let currentCategory = 'all';

        function init() {
            renderCategories();
            renderGames(games);
        }

        function renderCategories() {
            const list = document.getElementById('category-list');
            list.innerHTML = categories.map(cat => `
                <button 
                    onclick="filterCategory('${cat.id}')"
                    class="category-pill whitespace-nowrap flex items-center gap-2 px-6 py-3 rounded-2xl bg-white shadow-sm border border-slate-100 hover:border-indigo-200 transition-all ${currentCategory === cat.id ? 'active' : ''}"
                    id="cat-${cat.id}"
                >
                    <span class="text-lg">${cat.emoji}</span>
                    <span class="text-sm font-medium">${cat.name}</span>
                </button>
            `).join('');
        }

        function renderGames(gamesList) {
            const grid = document.getElementById('games-grid');
            const count = document.getElementById('game-count');
            
            count.innerText = `${gamesList.length} รายการ`;
            
            if (gamesList.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full py-12 text-center text-slate-400">
                        <div class="text-5xl mb-4">🔍</div>
                        <p>ไม่พบเกมที่คุณค้นหา ลองเปลี่ยนคำดูนะ</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = gamesList.map(game => `
                <div 
                    onclick="playGame(${game.id})"
                    class="game-card group cursor-pointer"
                >
                    <div class="${game.color} rounded-[2.5rem] p-8 aspect-square flex items-center justify-center relative mb-3 transition-all duration-300 group-hover:-translate-y-2 group-hover:shadow-xl group-hover:shadow-indigo-100 border border-transparent group-hover:border-white">
                        <span class="text-5xl transform transition-transform group-hover:scale-125">${game.emoji}</span>
                        <div class="absolute bottom-4 right-4 bg-white/80 backdrop-blur-sm px-2 py-1 rounded-xl text-[10px] font-bold flex items-center gap-1 shadow-sm">
                            <span class="text-yellow-500">★</span> ${game.rating}
                        </div>
                    </div>
                    <h3 class="font-semibold text-center text-sm md:text-base group-hover:text-indigo-600 transition-colors">${game.title}</h3>
                    <p class="text-[11px] text-slate-400 text-center mt-0.5">${categories.find(c => c.id === game.category).name}</p>
                </div>
            `).join('');
        }

        function filterCategory(catId) {
            currentCategory = catId;
            document.querySelectorAll('.category-pill').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`cat-${catId}`).classList.add('active');
            
            const filtered = catId === 'all' 
                ? games 
                : games.filter(g => g.category === catId);
            
            document.getElementById('grid-title').innerText = catId === 'all' 
                ? 'เกมทั้งหมด' 
                : 'เกมหมวด' + categories.find(c => c.id === catId).name;

            renderGames(filtered);
        }

        function handleSearch(val) {
            const term = val.toLowerCase();
            const filtered = games.filter(g => 
                g.title.toLowerCase().includes(term) || 
                categories.find(c => c.id === g.category).name.includes(term)
            );
            renderGames(filtered);
            document.getElementById('grid-title').innerText = term ? `ผลการค้นหา: ${val}` : 'เกมทั้งหมด';
        }

        function scrollToSearch() {
            document.getElementById('search-input').focus();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function playGame(gameId) {
            const game = games.find(g => g.id === gameId);
            document.getElementById('playing-title').innerText = game.title;
            document.getElementById('playing-emoji').innerText = game.emoji;
            document.getElementById('game-loader-icon').innerText = game.emoji;
            document.getElementById('game-modal').classList.remove('hidden');
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            document.getElementById('game-modal').classList.add('hidden');
            document.body.style.overflow = 'auto';
        }

        // Initialize
        window.onload = init;
    </script>
</body>
</html>
